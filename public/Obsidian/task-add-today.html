<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>

  <title>添加记录（今天）</title>
  <style>
    :root{
      --primary:#6366f1;--primary-dark:#4f46e5;--white:#fff;--dark:#1f2937;--gray:#6b7280;--light:#f8f9ff;
      --shadow:0 10px 20px rgba(0,0,0,.08);--radius:16px;--tr:all .25s ease;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,system-ui;
      background:transparent;color:var(--dark)}
    .wrap{max-width:680px;margin:20px auto;padding:20px}
    .card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px}
    h1{font-size:18px;margin-bottom:14px}
    .desc{color:var(--gray);font-size:13px;margin-bottom:18px}
    form{display:grid;gap:12px}
    .row{display:grid;grid-template-columns:1fr 140px;gap:12px}
    label{font-size:13px;color:var(--gray);margin-bottom:6px;display:block}
    input,select,button{
      width:100%;padding:12px 14px;border:1.5px solid #e5e7eb;border-radius:12px;font-size:15px;
      background:#fff;transition:var(--tr);outline:none
    }
    input:focus,select:focus{border-color:var(--primary);box-shadow:0 0 0 4px rgba(99,102,241,.15)}
    button{
      border:none;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;
      font-weight:600;cursor:pointer
    }
    button:active{transform:translateY(1px)}
    .hint{font-size:12px;color:#9ca3af}
    .ok{margin-top:10px;font-size:14px;color:#10b981;display:none}
    .err{margin-top:10px;font-size:14px;color:#ef4444;display:none}
    .inline{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    @media (max-width:520px){.row,.inline{grid-template-columns:1fr}}
    .login-guard{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;border-radius:12px;
      padding:12px 14px;margin-bottom:14px;display:none}
      
    

  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>添加记录（今天）</h1>
      <p class="desc">仅用于快速录入今天的任务。提交后会自动通知“查看页”刷新。</p>

      <div id="guard" class="login-guard">
        未检测到 <code>localStorage.currentUser</code>。请先在主站登录后再使用此页。
      </div>

      <form id="form" autocomplete="off">
        <div>
          <label for="desc">任务描述</label>
          <input id="desc" placeholder="例如：学习化学、背单词、锻炼…" required maxlength="60"/>
        </div>

        <div class="inline">
          <div>
            <label for="seg">时段</label>
            <select id="seg">
              <option>上午</option><option>下午</option><option>晚上</option>
            </select>
          </div>
          <div>
            <label for="score">分数（0-20）</label>
            <input id="score" type="number" inputmode="numeric" min="0" max="20" placeholder="例如 8" required/>
          </div>
        </div>

        <div class="row">
          <div>
            <label for="min">时长（分钟）</label>
            <input id="min" type="number" inputmode="numeric" min="0" placeholder="例如 25" required/>
            <div class="hint">积分=分数/30 × 分钟；自动记为今天。</div>
          </div>
          <div style="align-self:end">
            <button id="btn">+ 添加记录</button>
          </div>
        </div>

        <div id="ok" class="ok">已添加！</div>
        <div id="err" class="err">提交失败，请稍后再试。</div>
      </form>
    </div>
  </div>

<script>
  // 简单工具
  const clamp=(n,min,max)=>Math.min(Math.max(n,min),max);

  // 登录/用户
  const guard=document.getElementById('guard');
  const user=localStorage.currentUser||'';
  if(!user){ guard.style.display='block'; }

  // 与“查看页”通信
  const bc = ('BroadcastChannel' in window) ? new BroadcastChannel('lpt-tasks') : null;

  // 服务端数据结构
  let tasks={items:[],reviews:{}};

  async function loadTasks(){
    if(!user) return;
    try{
      tasks = await fetch(`/api/tasks/${user}`).then(r=>r.json());
    }catch(e){ tasks={items:[],reviews:{}}; }
  }

  async function saveTasks(){
    if(!user) return;
    await fetch(`/api/tasks/${user}`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(tasks)
    });
  }

  // 初始化
  loadTasks();

  // 表单
  const form=document.getElementById('form');
  const okEl=document.getElementById('ok');
  const errEl=document.getElementById('err');

  form.addEventListener('submit', async (e)=>{
    e.preventDefault();
    if(!user) return;

    okEl.style.display='none';
    errEl.style.display='none';

    const desc=form.desc.value.trim();
    const seg=form.seg.value;
    const score=clamp(+form.score.value||0,0,20);
    const minutes=Math.max(+form.min.value||0,0);

    if(!desc){ form.desc.focus(); return; }

    tasks.items.push({
      desc, seg, score, minutes,
      date:new Date().toISOString()
    });

    try{
      await saveTasks();
      okEl.style.display='block';
      form.reset();
      setTimeout(()=>okEl.style.display='none',1500);
      if(bc) bc.postMessage({type:'tasksUpdated',user});
    }catch(err){
      errEl.style.display='block';
      console.error(err);
    }
  });
</script>
</body>
</html>
