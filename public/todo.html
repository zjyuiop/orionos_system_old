<!-- /public/todo.html -->
<!DOCTYPE html><html lang="zh-CN"><head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>代办清单</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{--p:#4361ee;--s:#3f37c9;--a:#f72585;--b:#dee2e6;--bg:#f5f7fa;--bg2:#c3cfe2;--w:#fff}
        *{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",sans-serif}
        body{min-height:100vh;background:linear-gradient(135deg,var(--bg),var(--bg2));padding:24px}
        .container{max-width:1000px;margin:0 auto;background:var(--w);border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.1);overflow:hidden}
        header{display:flex;justify-content:space-between;align-items:center;gap:24px;flex-wrap:wrap;padding:20px 32px;background:linear-gradient(90deg,var(--p),var(--s));color:#fff}
        h1{font-size:1.5rem;font-weight:600;display:flex;align-items:center;gap:8px}
        nav a{color:#fff;text-decoration:none;margin:0 12px;opacity:.85}nav a.active,nav a:hover{opacity:1}
        .wallet{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.25);padding:8px 16px;border-radius:50px;font-weight:600}
        .content{padding:32px}
        form{display:grid;grid-template-columns:1fr 140px;gap:16px;margin-bottom:24px}
        input{padding:12px;border:1px solid var(--b);border-radius:10px}
        .btn{padding:12px;border:none;border-radius:10px;font-weight:600;background:var(--p);color:#fff;cursor:pointer}
        .list li{margin:10px 0;padding:12px 16px;border:1px solid var(--b);border-radius:10px;display:flex;align-items:center;gap:12px}
        .list li.done span{text-decoration:line-through;color:#6c757d}
        .del {
            border: none;
            background: none;
            color: var(--a);
            cursor: pointer;
            margin-left: auto;
            display: flex;            /* 新增，确保按钮撑开以显示图标 */
            align-items: center;
            justify-content: center;
        }
        /* 调整图标大小，让它更清晰 */
        .del i {
            font-size: 1rem;
        }



        /* ===== 手机竖屏响应式 ===== */
        @media (max-width: 480px) {
            .container    { width:100%!important; max-width:100%!important; padding:8px; }
            header        { flex-wrap:wrap!important; padding:12px 8px!important; }
            nav           { display:flex!important; overflow-x:auto!important; width:100%!important; }
            nav a         { flex:none!important; padding:8px 6px!important; font-size:.9rem!important; }
            form          { grid-template-columns:1fr!important; gap:8px!important; }
            input         { font-size:.95rem!important; padding:8px!important; }
            .btn          { font-size:.95rem!important; padding:8px!important; }
            .wallet       { font-size:.95rem!important; padding:8px!important; }
            .list li      { padding:10px!important; font-size:.85rem!important; }
            .del          { font-size:1rem!important; }
        }
    </style>
    </style></head><body>
<div class="container">
    <header>
        <h1><i class="fas fa-list-check"></i> 代办清单</h1>
        <nav>
            <a href="index.html">打分系统</a>
            <a href="note.html">闪电笔记</a>
            <a href="todo.html" class="active">代办清单</a>
            <a href="store.html">积分商店</a>
            <a href="user.html">用户信息</a>
            <a href="settings.html">设置</a>
        </nav>
        <div class="wallet"><i class="fas fa-coins"></i><span id="wal"></span></div>
    </header>

    <div class="content">
        <form id="addForm">
            <input id="task" placeholder="输入待办事项…" required>
            <button class="btn">添加</button>
        </form>
        <ul class="list" id="list"></ul>
    </div>
</div>

<script>
    if(!localStorage.currentUser) location.href='login.html';
    const user=localStorage.currentUser,$=id=>document.getElementById(id);
    let todos=[];
    const list = $('list');          // 之后 render() 和事件委托都共用

    /* -------- 读取并补旧数据 -------- */
    const load = () => fetch(`/api/todos/${user}`)
        .then(r => r.json())
        .then(d => {
            todos = d;                               // ① 原本就有
            todos.forEach(t => {                     // ② 给旧记录补字段
                if (t.deleted === undefined) t.deleted = false;
            });
        });
    const save=()=>fetch(`/api/todos/${user}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(todos)});
    const wallet=async()=>{
        const t=await fetch(`/api/tasks/${user}`).then(r=>r.json()).catch(()=>[]);
        const s=await fetch(`/api/store/${user}`).then(r=>r.json()).catch(()=>({history:[]}));
        const earned=t.reduce((sum,i)=>sum+i.score/30*i.minutes,0);
        const spent=s.history.reduce((sum,i)=>sum+i.price,0);
        $('wal').textContent=Math.floor(earned-spent);
    };

    function render() {
        list.innerHTML = '';
        todos
            .filter(t => !t.deleted)                     // ① 只取未删除项
            .forEach(t => {
                const realIdx = todos.indexOf(t);          // ② 记录原数组索引
                const li = document.createElement('li');
                li.innerHTML = `
          <input type="checkbox" data-i="${realIdx}" ${t.done ? 'checked' : ''}>
          <span>${t.text}</span>
          <button class="del" data-i="${realIdx}">
            <i class="fas fa-trash"></i>
          </button>
        `;
                list.appendChild(li);
            });
    }

    /* 事件绑定、save() 等其余代码 … */

    $('addForm').onsubmit=async e=>{
        e.preventDefault();
        todos.push({text:$('task').value.trim(),done:false,deleted: false});
        $('task').value='';await save();render();
    };



    list.onclick = async e => {
        /* ---------- 删除按钮 ---------- */
        const delBtn = e.target.closest('button.del');
        if (delBtn) {
            const idx = +delBtn.dataset.i;   // 原数组索引
            todos[idx].deleted = true;       // 逻辑删除，不 splice
            await save();
            render();
            return;                          // 删完就别再往下走
        }

        /* ---------- 勾选框 ---------- */
        if (e.target.type === 'checkbox') {
            const idx = +e.target.dataset.i;
            todos[idx].done = e.target.checked;
            await save();
            render();
        }
    };

    (async()=>{await load();render();wallet();})();
</script></body></html>
