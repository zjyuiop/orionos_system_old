<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>用户信息</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
        :root{--p:#4361ee;--s:#3f37c9;--bg:#f5f7fa;--bg2:#c3cfe2;--w:#fff;--b:#dee2e6}
        *{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",sans-serif}
        body{min-height:100vh;background:linear-gradient(135deg,var(--bg),var(--bg2));padding:24px}
        .container{max-width:820px;margin:0 auto;background:var(--w);border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.08);overflow:hidden}
        header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;padding:20px 32px;background:linear-gradient(90deg,var(--p),var(--s));color:#fff}
        nav a{color:#fff;text-decoration:none;margin:0 12px;opacity:.85}nav a.active,nav a:hover{opacity:1}

        .content{padding:32px}
        /* ---- 头像 ---- */
        .avatar-wrapper{width:120px;height:120px;margin:0 auto 32px;position:relative;cursor:pointer}
        .avatar-img{width:100%;height:100%;object-fit:cover;border-radius:50%;border:4px solid var(--p);background:#e9ecef}
        .avatar-edit{position:absolute;bottom:4px;right:4px;width:32px;height:32px;border-radius:50%;background:var(--p);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.8rem;border:2px solid #fff}
        input#avatar-file{display:none}

        /* ---- 表单网格 ---- */
        form{display:grid;grid-template-columns:110px 1fr;row-gap:22px;column-gap:16px;align-items:start}
        label{font-weight:600;text-align:right;line-height:2}
        input,textarea,select{width:100%;padding:10px;border:1px solid var(--b);border-radius:8px}
        input[readonly]{background:#f1f3f5}
        textarea{min-height:70px;resize:vertical}
        .btn{grid-column:2/3;margin-top:4px;padding:12px 26px;border:none;border-radius:10px;font-weight:600;background:var(--p);color:#fff;cursor:pointer}
        #msg{grid-column:2/3;color:var(--p);margin-top:8px;display:none}

        /* ===== 手机竖屏响应式 ===== */
        @media (max-width: 480px) {
            .container        { width:100%!important; max-width:100%!important; padding:8px; }
            header            { flex-wrap:wrap!important; padding:12px 8px!important; }
            nav               { display:flex!important; overflow-x:auto!important; width:100%!important; }
            nav a             { flex:none!important; padding:8px 6px!important; font-size:.9rem!important; }
            .avatar-wrapper   { width:80px!important; height:80px!important; margin-bottom:16px; }
            .avatar-img       { border-width:3px!important; }
            .avatar-edit      { width:24px!important; height:24px!important; bottom:2px!important; right:2px!important; }
            form              { grid-template-columns:1fr!important; gap:12px!important; }
            label             { text-align:left!important; }
            input, textarea, select, .btn {
                font-size:.95rem!important; padding:8px!important; }
            #msg              { font-size:.9rem!important; }
        }
    </style>

    </style>
</head>

<body>
<div class="container">
    <header>
        <h1><i class="fas fa-user-circle"></i> 用户信息</h1>
        <nav>
            <a href="index.html">打分系统</a>
            <a href="note.html">闪电笔记</a>
            <a href="todo.html">代办清单</a>
            <a href="store.html">积分商店</a>
            <a href="user.html" class="active">用户信息</a>
            <a href="settings.html">设置</a>
        </nav>
    </header>

    <div class="content">
        <!-- 头像 -->
        <div class="avatar-wrapper" id="aw">
            <img id="avatar" class="avatar-img" src="https://cdn.jsdelivr.net/gh/identicons/identicon-api@latest/svg?seed=default" alt="头像" />
            <div class="avatar-edit"><i class="fas fa-camera"></i></div>
            <input type="file" id="avatar-file" accept="image/*" />
        </div>

        <!-- 表单 -->
        <form id="form">
            <label>用户名</label>
            <input id="username" readonly />

            <label>密码</label>
            <input value="********" readonly />

            <label>昵称</label>
            <input id="nickname" />

            <label>性别</label>
            <select id="gender">
                <option value="">保密</option>
                <option value="male">男</option>
                <option value="female">女</option>
                <option value="other">其他</option>
            </select>

            <label>生日</label>
            <div style="display:flex;gap:12px;align-items:center">
                <input id="birthday" type="date" style="flex:1" />
                <span id="zodiac" style="min-width:72px;color:#666"></span>
            </div>

            <label>居住地</label>
            <input id="location" placeholder="省 / 市 / 区" />

            <label>个性签名</label>
            <textarea id="signature" placeholder="写一句话介绍自己…"></textarea>

            <label>微信号</label>
            <input id="wechat" />

            <button type="submit" class="btn">保存</button>
            <div id="msg">保存成功！</div>
        </form>
    </div>
</div>

<script>
    /* -------- 初始化登陆检查 -------- */
    if(!localStorage.currentUser) location.href='login.html';
    const user = localStorage.currentUser;
    document.getElementById('username').value = user;

    /* -------- 获取后端资料 -------- */
    fetch(`/api/user/${encodeURIComponent(user)}`)
        .then(r=>r.json())
        .then(d=>{
            if(d.avatar) document.getElementById('avatar').src = d.avatar;
            ['nickname','gender','birthday','location','signature','wechat'].forEach(k=>{
                const el=document.getElementById(k);
                if(el && d[k]!=null) el.value=d[k];
            });
            renderZodiac();
        });

    /* -------- 星座 ---------- */
    function zodiac(m,d){
        const s='摩羯水瓶双鱼白羊金牛双子巨蟹狮子处女天秤天蝎射手摩羯';
        const o=[20,19,21,21,21,22,23,23,23,24,23,22];
        return s.substr(m*2-(d<o[m-1]?2:0),2)+'座';
    }
    function renderZodiac(){
        const val=document.getElementById('birthday').value;
        document.getElementById('zodiac').textContent=
            val?zodiac(+val.split('-')[1],+val.split('-')[2]):'';
    }
    document.getElementById('birthday').addEventListener('change',renderZodiac);

    /* -------- 保存按钮 ---------- */
    document.getElementById('form').addEventListener('submit',async e=>{
        e.preventDefault();
        const body={
            nickname:  document.getElementById('nickname').value.trim(),
            gender:    document.getElementById('gender').value,
            birthday:  document.getElementById('birthday').value,
            location:  document.getElementById('location').value.trim(),
            signature: document.getElementById('signature').value.trim(),
            wechat:    document.getElementById('wechat').value.trim()
        };
        const r=await fetch(`/api/user/${encodeURIComponent(user)}`,{
            method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)
        });
        if(r.ok){
            const m=document.getElementById('msg');
            m.style.display='block';setTimeout(()=>m.style.display='none',2000);
        }else alert('保存失败');
    });

    /* -------- 头像上传 ---------- */
    const aw=document.getElementById('aw'),
        af=document.getElementById('avatar-file'),
        img=document.getElementById('avatar');

    aw.addEventListener('click',()=>af.click());
    af.addEventListener('change',async ()=>{
        if(!af.files.length) return;
        const fd=new FormData();fd.append('files',af.files[0]);
        const res=await fetch('/api/upload',{method:'POST',body:fd});
        if(!res.ok){alert('上传失败');return;}
        const {urls}=await res.json(),url=urls[0];
        img.src=url;
        await fetch(`/api/user/${encodeURIComponent(user)}`,{
            method:'POST',headers:{'Content-Type':'application/json'},
            body:JSON.stringify({avatar:url})
        });
    });
</script>
</body>
</html>
