<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
    <title>用户信息</title>
    <!-- 图标 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <style>
        /* 统一主题变量 */
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --secondary: #8b5cf6;
            --accent: #ec4899;
            --gray: #6b7280;
            --light-gray: #f3f4f6;
            --white: #ffffff;
            --shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
            --shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
            --radius: 16px;
            --transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100vh;color:var(--gray);background:#f5f7ff;position:relative;overflow-x:hidden;}
        /* 渐变背景 */
        body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(125deg,#667eea,#764ba2);z-index:-2;}
        /* 玻璃容器 */
        .container{max-width:1200px;margin:24px auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-radius:24px;box-shadow:0 30px 60px rgba(0,0,0,0.1);overflow:hidden;border:1px solid rgba(255,255,255,0.3);}
        /* 头部 */
        header{background:rgba(99,102,241,0.9);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);padding:24px 32px;position:relative;}
        .header-content{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:24px;position:relative;z-index:1;}
        .logo{display:flex;align-items:center;gap:12px;font-size:1.8rem;font-weight:700;color:var(--white);text-shadow:0 2px 4px rgba(0,0,0,0.2);}
        nav{display:flex;gap:8px;flex-wrap:wrap;}
        nav a{color:var(--white);text-decoration:none;padding:8px 16px;border-radius:8px;transition:var(--transition);font-weight:500;white-space:nowrap;}
        nav a:hover,nav a.active{background:rgba(255,255,255,0.2);}
        .header-controls{display:flex;gap:16px;align-items:center;}
        .wallet{background:rgba(255,255,255,0.2);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);padding:10px 20px;border-radius:12px;display:flex;align-items:center;gap:8px;color:var(--white);font-weight:600;transition:var(--transition);white-space:nowrap;}
        .wallet:hover{transform:translateY(-2px);}
        /* 内容 */
        .content{padding:40px;}
        /* 头像区域 */
        .avatar-wrapper{width:120px;height:120px;margin:0 auto 32px;position:relative;cursor:pointer;}
        .avatar-img{width:100%;height:100%;object-fit:cover;border-radius:50%;border:4px solid var(--primary);background:var(--light-gray);transition:var(--transition);}
        .avatar-wrapper:hover .avatar-img{transform:scale(1.05);}
        .avatar-edit{position:absolute;bottom:4px;right:4px;width:32px;height:32px;border-radius:50%;background:var(--accent);color:var(--white);display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);transition:var(--transition);}
        .avatar-edit:hover{transform:scale(1.1);}
        #avatar-file{display:none;}
        /* 表单卡片 */
        .form-card{background:rgba(255,255,255,0.9);padding:24px;border-radius:16px;box-shadow:0 10px 20px rgba(0,0,0,0.1);}
        /* 垂直单列布局 */
        .form-grid{display:grid;grid-template-columns:1fr;gap:24px;}
        .form-group{display:flex;flex-direction:column;gap:8px;}
        .form-group label{font-weight:600;color:var(--gray);}
        .form-group input,
        .form-group select,
        .form-group textarea{padding:12px;border:1px solid var(--light-gray);border-radius:var(--radius);background:var(--white);transition:var(--transition);font-size:1rem;}
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 4px 12px rgba(99,102,241,0.2);}
        textarea{resize:vertical;min-height:100px;}
        .btn-save{margin-top:24px;padding:12px 24px;background:linear-gradient(90deg,var(--primary),var(--primary-dark));color:var(--white);border:none;border-radius:9999px;font-weight:600;cursor:pointer;box-shadow:0 6px 20px rgba(99,102,241,0.3);transition:var(--transition);}
        .btn-save:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);}
        #msg{margin-top:12px;color:var(--success);opacity:0;transition:var(--transition);}
        #msg.show{opacity:1;}
        /* 响应式 */
        @media(max-width:768px){.content{padding:24px;}header{padding:20px;}.btn-save{width:100%;text-align:center;}}
        @media(max-width:480px){header{padding:16px;} .header-content{flex-direction:column;align-items:flex-start;}nav{overflow-x:auto;} .form-card{padding:16px;} .content{padding:16px;} .btn-save{width:100%;}}
    </style>
</head>
<body>
<div class="container">
    <header>
        <div class="header-content">
            <div class="logo"><i class="fas fa-user-circle"></i><span>用户信息</span></div>
            <nav>
                <a href="dashboard.html">看板</a>
                <a href="index.html">打分系统</a>
                <a href="note.html">闪电笔记</a>
                <a href="todo.html">待办清单</a>
                <a href="store.html">积分商店</a>
                <a href="user.html" class="active">用户信息</a>
                <a href="settings.html">设置</a>
            </nav>
            <div class="header-controls">
                <div class="wallet"><i class="fas fa-coins"></i><span id="wal">0</span></div>
            </div>
        </div>
    </header>
    <div class="content">
        <div class="avatar-wrapper">
            <img id="avatar" class="avatar-img" src="https://cdn.jsdelivr.net/gh/identicons/identicon-api@latest/svg?seed=default" alt="头像"/>
            <div class="avatar-edit"><i class="fas fa-camera"></i></div>
            <input type="file" id="avatar-file" accept="image/*"/>
        </div>
        <div class="form-card">
            <form id="form">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="username">用户名</label>
                        <input id="username" readonly/>
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input value="********" readonly/>
                    </div>
                    <div class="form-group">
                        <label for="nickname">昵称</label>
                        <input id="nickname"/>
                    </div>
                    <div class="form-group">
                        <label for="gender">性别</label>
                        <select id="gender">
                            <option value="">保密</option>
                            <option value="male">男</option>
                            <option value="female">女</option>
                            <option value="other">其他</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="birthday">生日</label>
                        <input id="birthday" type="date"/>
                    </div>
                    <div class="form-group">
                        <label for="location">居住地</label>
                        <input id="location" placeholder="省 / 市 / 区"/>
                    </div>
                    <div class="form-group">
                        <label for="signature">个性签名</label>
                        <textarea id="signature" placeholder="写一句话介绍自己…"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="wechat">微信号</label>
                        <input id="wechat"/>
                    </div>
                </div>
                <button type="submit" class="btn-save">保存</button>
                <div id="msg">保存成功！</div>
            </form>
        </div>
    </div>
</div>
<script>
    // 保持原有脚本并新增余额逻辑
    if(!localStorage.currentUser) location.href='login.html';
    const user=localStorage.currentUser;
    const $=id=>document.getElementById(id);
    // 更新余额
    async function updateWal(){
        const tasks=await fetch(`/api/tasks/${user}`).then(r=>r.json());
        const earned=tasks.items
            ? tasks.items.reduce((s,t)=>s+(t.score/30)*t.minutes,0)
            : tasks.reduce((s,t)=>s+(t.score/30)*t.minutes,0);
        const hist=await fetch(`/api/store/${user}`).then(r=>r.json()).then(d=>d.history||[]);
        const wallet=Math.floor(earned-hist.reduce((s,h)=>s+h.price,0));
        $('wal').textContent=wallet;
    }
    // 初始化用户信息
    $('username').value=user;
    fetch(`/api/user/${encodeURIComponent(user)}`)
        .then(r=>r.json()).then(d=>{
        if(d.avatar) $('avatar').src=d.avatar;
        ['nickname','gender','birthday','location','signature','wechat'].forEach(k=>{if(d[k]!=null)$(k).value=d[k];});
    });
    // 头像上传
    const aw=document.querySelector('.avatar-wrapper'),af=$('avatar-file'),img=$('avatar');
    aw.addEventListener('click',()=>af.click());
    af.addEventListener('change',async()=>{
        if(!af.files.length) return;
        const fd=new FormData(); fd.append('files',af.files[0]);
        const res=await fetch('/api/upload',{method:'POST',body:fd});
        if(!res.ok){alert('上传失败');return;}
        const {urls}=await res.json(), url=urls[0]; img.src=url;
        await fetch(`/api/user/${encodeURIComponent(user)}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({avatar:url})});
    });
    // 保存表单
    $('form').addEventListener('submit',async e=>{
        e.preventDefault();
        const body={nickname:$('nickname').value.trim(),gender:$('gender').value,birthday:$('birthday').value,location:$('location').value.trim(),signature:$('signature').value.trim(),wechat:$('wechat').value.trim()};
        const r=await fetch(`/api/user/${encodeURIComponent(user)}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
        if(r.ok){const m=$('msg');m.classList.add('show');setTimeout(()=>m.classList.remove('show'),2000);} else alert('保存失败');
    });
    // 调用更新余额
    updateWal();
</script>
</body>
</html>
