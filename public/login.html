<!DOCTYPE html><html lang="zh-CN"><head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>用户登录</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{--p:#4361ee;--s:#3f37c9;--a:#f72585;--b:#dee2e6;--bg:#f5f7fa;--bg2:#c3cfe2;--w:#fff;--g:#6c757d}
        *{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",sans-serif}
        body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:linear-gradient(135deg,var(--bg),var(--bg2))}
        .card{width:380px;background:var(--w);padding:40px;border-radius:18px;box-shadow:0 14px 36px rgba(0,0,0,.12)}
        h2{text-align:center;color:var(--p);margin-bottom:28px}
        .grp{margin-bottom:22px}label{display:block;font-size:.85rem;color:var(--g);margin-bottom:6px}
        input{width:100%;padding:11px;border:1px solid var(--b);border-radius:10px}
        .btn{width:100%;padding:12px;border:none;border-radius:10px;font-weight:600;cursor:pointer;background:var(--p);color:#fff}
        .toggle{background:none;border:none;color:var(--a);margin-top:18px;cursor:pointer}
        .msg{margin-top:18px;text-align:center;font-size:.9rem;min-height:1.2rem}
    </style></head><body>
<div class="card">
    <h2 id="title">登录</h2>
    <form id="form">
        <div class="grp"><label>用户名</label><input id="user" required></div>
        <div class="grp"><label>密码</label><input id="pass" type="password" required></div>
        <button class="btn" id="submit">登录</button>
    </form>
    <button class="toggle" id="toggle">去注册</button>
    <div id="msg" class="msg"></div>
</div>

<script>
    let isLogin=true;const $=id=>document.getElementById(id);
    function sync(){ $('title').textContent=isLogin?'登录':'注册'; $('submit').textContent=isLogin?'登录':'注册'; $('toggle').textContent=isLogin?'去注册':'去登录'; $('msg').textContent='';$('form').reset(); }
    $('toggle').onclick=()=>{isLogin=!isLogin;sync();};
    $('form').onsubmit=async e=>{
        e.preventDefault();
        const body=JSON.stringify({username:$('user').value.trim(),password:$('pass').value});
        const r=await fetch(isLogin?'/api/login':'/api/register',{method:'POST',headers:{'Content-Type':'application/json'},body});
        const d=await r.json(); $('msg').textContent=d.msg; $('msg').style.color=r.ok?'var(--p)':'var(--a)';
        if(r.ok&&isLogin){localStorage.currentUser=$('user').value.trim();location.href='index.html';}
        if(r.ok&&!isLogin)setTimeout(sync,600);
    };
</script>
</body></html>
