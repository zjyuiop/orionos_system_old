<!-- /public/login.html  -->
<!DOCTYPE html><html lang="zh-CN"><head>
    <script defer src="js/login.js"></script>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>登录 / 注册</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{--p:#4361ee;--s:#3f37c9;--a:#f72585;--bg:#f5f7fa;--bg2:#c3cfe2;--w:#fff;--b:#dee2e6}
        *{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",sans-serif}
        body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--bg),var(--bg2));padding:24px}
        .card{width:100%;max-width:440px;background:var(--w);border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,.1);overflow:hidden}
        .head{display:flex} .tab{flex:1;text-align:center;padding:16px;font-weight:600;cursor:pointer;color:#fff}
        .tab[data-act]{background:var(--p)} .tab:not([data-act]){background:var(--s);opacity:.7}
        body.dark .tab:not([data-act]){background:#333}
        .panel{display:none;padding:40px 36px} .panel[data-act]{display:block}
        input{width:100%;padding:12px 14px;border:1px solid var(--b);border-radius:10px;margin:12px 0;font-size:1rem}
        .btn{width:100%;padding:12px;border:none;border-radius:10px;font-weight:600;background:var(--p);color:#fff;cursor:pointer;margin-top:6px}
        .msg{margin-top:14px;font-size:.9rem;color:#d32f2f;text-align:center;display:none}
        .link{margin-top:22px;text-align:center;font-size:.9rem;color:var(--p);cursor:pointer}
    </style></head><body>

<div class="card">
    <div class="head">
        <div class="tab" id="t-login" data-act>登录</div>
        <div class="tab" id="t-reg">注册</div>
    </div>

    <!-- 登录面板 -->
    <div class="panel" id="p-login" data-act>
        <form id="form-login">
            <input id="l-user" placeholder="用户名" autocomplete="username" required>
            <input id="l-pwd"  type="password" placeholder="密码" autocomplete="current-password" required>
            <button class="btn">登录</button>
            <div id="l-msg" class="msg"></div>
        </form>
    </div>

    <!-- 注册面板 -->
    <div class="panel" id="p-reg">
        <form id="form-reg">
            <input id="r-user" placeholder="用户名" autocomplete="username" required>
            <input id="r-pwd"  type="password" placeholder="密码" autocomplete="new-password" required>
            <button class="btn">注册</button>
            <div id="r-msg" class="msg"></div>
        </form>
    </div>
</div>

<script>
    /* ---------- Tab 切换 ---------- */
    const setAct = t =>{
        document.querySelectorAll('.tab').forEach(el=>el.toggleAttribute('data-act',el===t));
        document.querySelectorAll('.panel').forEach(p=>p.toggleAttribute('data-act',p.id==='p-'+t.id.slice(2)));
    };
    document.getElementById('t-login').onclick=e=>setAct(e.target);
    document.getElementById('t-reg').onclick  =e=>setAct(e.target);

    /* ---------- 登录 ---------- */
    document.getElementById('form-login').addEventListener('submit',async e=>{
        e.preventDefault();const msg=document.getElementById('l-msg');msg.style.display='none';
        const username=document.getElementById('l-user').value.trim(),
            password=document.getElementById('l-pwd').value.trim();
        try{
            const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},
                body:JSON.stringify({username,password})});
            const d=await r.json();
            if(r.ok){localStorage.currentUser=username;location.href='index.html';}
            else{msg.textContent=d.msg||'登录失败';msg.style.display='block';}
        }catch(_){msg.textContent='网络错误';msg.style.display='block';}
    });

    /* ---------- 注册 ---------- */
    document.getElementById('form-reg').addEventListener('submit',async e=>{
        e.preventDefault();const msg=document.getElementById('r-msg');msg.style.display='none';
        const username=document.getElementById('r-user').value.trim(),
            password=document.getElementById('r-pwd').value.trim();
        try{
            const r=await fetch('/api/register',{method:'POST',headers:{'Content-Type':'application/json'},
                body:JSON.stringify({username,password})});
            const d=await r.json();
            if(r.ok){alert('注册成功，请登录');setAct(document.getElementById('t-login'));}
            else{msg.textContent=d.msg||'注册失败';msg.style.display='block';}
        }catch(_){msg.textContent='网络错误';msg.style.display='block';}
    });
</script>

</body></html>
